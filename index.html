<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Isaroro Bot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Logo arriba a la izquierda -->
  <header class="header">
    <h1 class="logo">IsaroroBot</h1>
  </header>

  <!-- Contenido principal -->
  <div class="main">
    <p class="intro">Hola, nombre<br>¿Por dónde empezamos?</p>

    <!-- Caja de chat -->
    <div class="chat-box" id="chatBox">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <span class="placeholder">Pregúntale a IsaBot...</span>
        <input id="userInput" type="text">
        <button id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
