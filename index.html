<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IsaBot 💕</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Logo arriba a la izquierda -->
  <header class="header">
    <h1 class="logo">IsaBot 💕</h1>
  </header>

  <!-- Texto central -->
  <div class="main">
    <p class="intro">Hola ¿cómo estás?<br>¿Por dónde empezamos?</p>

    <!-- Área de mensajes -->
    <div class="messages" id="messages">
      <div class="bot">Hola 💕 soy IsaBot, ¿cómo estás?</div>
      <div class="user">Estoy muy bien, gracias 😄</div>
    </div>
  </div>

  <!-- Barra inferior (caja de texto) -->
  <footer class="footer">
    <div class="input-area">
      <label for="fileInput" class="attach-btn">➕</label>
      <input type="file" id="fileInput" style="display:none;">
      <input id="userInput" type="text" placeholder="Pregúntale a IsaBot...">
      <button id="sendBtn">➤</button>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
