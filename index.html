<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Isaroro Bot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Logo arriba a la izquierda -->
  <header class="header">
    <h1 class="logo">IsaroroBot</h1>
  </header>

  <!-- Texto central -->
  <div class="main">
    <p class="intro">Hola ¿cómo estás?<br>¿Por dónde empezamos?</p>

    <!-- Caja de chat -->
    <div class="chat-box" id="chatBox" style="display:none;">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <input id="userInput" type="text" placeholder="Escribe tu mensaje...">
        <button id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <!-- Barra inferior degradada -->
  <footer class="footer">
    <button class="ask-bar">➕ Pregúntale a IsaBot</button>
  </footer>

  <script src="script.js"></script>
</body>
</html>
