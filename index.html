<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Isaroro Bot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Barra lateral -->
  <div class="sidebar">
    <div class="menu">☰</div>
    <div class="circle"></div>
  </div>

  <!-- Contenido principal -->
  <div class="main">
    <h1 class="logo">Isaroro Bot</h1>
    <p class="intro">Hola, nombre<br>¿Por dónde empezamos?</p>

    <!-- Caja de chat visible desde el inicio -->
    <div class="chat-box" id="chatBox">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <input id="userInput" type="text" placeholder="Escribe tu mensaje...">
        <button id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
