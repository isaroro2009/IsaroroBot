<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IsaBot 💕</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
  <script type="module" src="script.js"></script>
</head>
<body>
  <div class="chat-container" id="chatContainer">
    <button id="menuBtn" class="menu-btn">☰</button>

    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Mis Chats 💬</h2>
      </div>
      
      <div class="sidebar-content">
        <ul id="chatList"></ul>
      </div>
      
      <div class="sidebar-actions-footer">
        <button id="newChatBtn" class="kawaii-sidebar-btn chat-btn">✨ Nuevo chat ➕</button>
        <footer class="sidebar-footer" id="userFooter">👤 Invitado</footer>
      </div>
    </div>

    <header class="header">
      <h1 class="logo">IsaBot 💕</h1>
    </header>

    <div class="main">
      <h2 class="intro">Hola ¿cómo estás?<br>¿Por dónde empezamos?</h2>
      <div class="messages" id="messages"></div>
    </div>

    <footer class="footer">
      <div class="input-area">
        <label for="fileInput" class="attach-btn">➕</label>
        <input type="file" id="fileInput" style="display:none;">
        <input id="userInput" type="text" placeholder="Pregúntale a IsaBot...">
        <button id="sendBtn">➤</button>
      </div>
    </footer>
  </div>
</body>
</html>
