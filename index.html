<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IsaBot 💕</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore.js"></script>
</head>
<body>
  <!-- Registro/Login -->
  <div class="auth-container">
    <h2>Registro / Login</h2>
    <input type="text" id="username" placeholder="Nombre">
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="registerBtn">Registrarse</button>
    <button id="loginBtn">Iniciar sesión</button>
  </div>

  <!-- Botón menú -->
  <button id="menuBtn" class="menu-btn">☰</button>

  <!-- Menú lateral -->
  <div class="sidebar" id="sidebar">
    <h2>Mis Chats 💬</h2>
    <ul id="chatList"></ul>
    <button id="newChatBtn">➕ Nuevo chat</button>
    <footer class="sidebar-footer" id="userFooter">
      👤 Invitado
    </footer>
  </div>

  <!-- Logo -->
  <header class="header">
    <h1 class="logo">IsaBot 💕</h1>
  </header>

  <!-- Área principal -->
  <div class="main">
    <h2 class="intro">Hola ¿cómo estás?<br>¿Por dónde empezamos?</h2>
    <div class="messages" id="messages"></div>
  </div>

  <!-- Barra inferior -->
  <footer class="footer">
    <div class="input-area">
      <label for="fileInput" class="attach-btn">➕</label>
      <input type="file" id="fileInput" style="display:none;">
      <input id="userInput" type="text" placeholder="Pregúntale a IsaBot...">
      <button id="sendBtn">➤</button>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
