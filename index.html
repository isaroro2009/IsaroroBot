<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IsaBot 💕</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Script principal -->
  <script type="module" src="script.js"></script>
</head>
<body>
  <!-- Contenedor principal del chat -->
  <div class="chat-container" id="chatContainer">
    <!-- Botón menú -->
    <button id="menuBtn" class="menu-btn">☰</button>

    <!-- Menú lateral -->
    <div class="sidebar" id="sidebar">
      <h2>Mis Chats 💬</h2>
      
      <!-- Botón para iniciar sesión con nombre -->
      <button id="nameLoginBtn">✨ Inicia sesión con tu Nombre</button>
      
      <!-- Lista de chats -->
      <ul id="chatList"></ul>
      
      <!-- Crear nuevo chat -->
      <button id="newChatBtn">➕ Nuevo chat</button>
      
      <!-- Footer con nombre del usuario -->
      <footer class="sidebar-footer" id="userFooter">👤 Invitado</footer>
    </div>

    <!-- Logo superior -->
    <header class="header">
      <h1 class="logo">IsaBot 💕</h1>
    </header>

    <!-- Área principal -->
    <div class="main">
      <h2 class="intro">Hola ¿cómo estás?<br>¿Por dónde empezamos?</h2>
      <div class="messages" id="messages"></div>
    </div>

    <!-- Barra inferior -->
    <footer class="footer">
      <div class="input-area">
        <label for="fileInput" class="attach-btn">➕</label>
        <input type="file" id="fileInput" style="display:none;">
        <input id="userInput" type="text" placeholder="Pregúntale a IsaBot...">
        <button id="sendBtn">➤</button>
      </div>
    </footer>
  </div>
</body>
</html>
