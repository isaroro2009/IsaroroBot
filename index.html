<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Isaroro Bot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sidebar">
    <div class="menu">☰</div>
    <div class="circle"></div>
  </div>

  <div class="main">
    <h1>Isaroro bot</h1>
    <p class="intro">Hola, nombre<br>¿Por dónde empezamos?</p>
    <button class="ask-btn">➕ Pregúntale a IsaBot</button>

    <!-- Caja de chat -->
    <div class="chat-box" id="chatBox">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <input id="userInput" type="text" placeholder="Escribe tu mensaje...">
        <button id="sendBtn">Enviar</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
