<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IsaroroBot</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Logo arriba a la izquierda -->
  <header class="header">
    <h1 class="logo">IsaroroBot</h1>
  </header>

  <!-- Texto central -->
  <div class="main">
    <p class="intro">Hola ¿cómo estás?<br>¿Por dónde empezamos?</p>

    <!-- Caja de chat -->
    <div class="chat-box" id="chatBox">
      <div class="messages" id="messages"></div>
      <div class="input-area">
        <button class="attach-btn">➕</button>
        <input id="userInput" type="text" placeholder="Pregúntale a IsaBot...">
        <button id="sendBtn">➤</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
