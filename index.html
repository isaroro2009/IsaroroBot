<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IsaBot 💕</title>
  <link rel="stylesheet" href="style.css">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <!-- Botón menú -->
  <button id="menuBtn" class="menu-btn">☰</button>

  <!-- Menú lateral -->
  <div class="sidebar" id="sidebar">
    <h2>Mis Chats 💬</h2>
    <ul id="chatList"></ul>
    <button id="newChatBtn">➕ Nuevo chat</button>
    <footer class="sidebar-footer">
      👤 Isabella 💕
    </footer>
  </div>

  <!-- Logo arriba a la izquierda -->
  <header class="header">
    <h1 class="logo">IsaBot 💕</h1>
  </header>

  <!-- Texto central -->
  <div class="main">
    <h2 class="intro">Hola ¿cómo estás?<br>¿Por dónde empezamos?</h2>

    <!-- Área de mensajes -->
    <div class="messages" id="messages"></div>
  </div>

  <!-- Barra inferior (caja de texto) -->
  <footer class="footer">
    <div class="input-area">
      <label for="fileInput" class="attach-btn">➕</label>
      <input type="file" id="fileInput" style="display:none;">
      <input id="userInput" type="text" placeholder="Pregúntale a IsaBot...">
      <button id="sendBtn">➤</button>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
