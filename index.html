<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>IsaBot 💕</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Firebase SDK v12 con módulos -->
  <script type="module" src="script.js"></script>
</head>
<body>
  <!-- Formulario de registro/login -->
  <div class="auth-container" id="authContainer">
    <h2>Registro / Login</h2>
    <input type="text" id="username" placeholder="Nombre">
    <input type="email" id="email" placeholder="Correo">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="registerBtn">Registrarse</button>
    <button id="loginBtn">Iniciar sesión</button>
  </div>

  <!-- Contenedor del chat (oculto hasta login) -->
  <div class="chat-container" id="chatContainer" style="display:none;">
    <!-- Botón menú -->
    <button id="menuBtn" class="menu-btn">☰</button>

    <!-- Menú lateral -->
    <div class="sidebar" id="sidebar">
      <h2>Mis Chats 💬</h2>
      <ul id="chatList"></ul>
      <button id="newChatBtn">➕ Nuevo chat</button>
      <footer class="sidebar-footer" id="userFooter">👤 Invitado</footer>
    </div>

    <!-- Logo -->
    <header class="header">
      <h1 class="logo">IsaBot 💕</h1>
    </header>

    <!-- Área principal -->
    <div class="main">
      <h2 class="intro">Hola ¿cómo estás?<br>¿Por dónde empezamos?</h2>
      <div class="messages" id="messages"></div>
    </div>

    <!-- Barra inferior -->
    <footer class="footer">
      <div class="input-area">
        <label for="fileInput" class="attach-btn">➕</label>
        <input type="file" id="fileInput" style="display:none;">
        <input id="userInput" type="text" placeholder="Pregúntale a IsaBot...">
        <button id="sendBtn">➤</button>
      </div>
    </footer>
  </div>
</body>
</html>
